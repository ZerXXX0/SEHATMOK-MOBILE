name: sehatmok_mobile
description: "SehatMok Mobile - Health and nutrition management application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Networking & API
  http: ^1.1.0
  dio: ^5.3.1
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage & Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI & Design
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.7
  
  # Internationalization & Localization
  intl: ^0.19.0
  
  # Firebase & Push Notifications (commented out temporarily for web build)
  # firebase_core: ^2.24.0
  # firebase_messaging: ^14.6.0
  # firebase_analytics: ^10.4.0
  
  # Date & Time
  timeago: ^3.6.0
  
  # Form Validation & Serialization
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  
  # Authentication
  jwt_decoder: ^2.0.1
  
  # Logging
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
